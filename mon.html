<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Para Mon 💜</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400;1,700&family=Inter:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #060008;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
      overflow-y: auto;
      font-family: 'Inter', sans-serif;
      padding: 3rem 0 3rem;
      gap: 0.5rem;
    }

    canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    /* Glow blob behind bouquet */
    .glow-blob {
      position: fixed;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(160,32,240,0.18) 0%, transparent 70%);
      border-radius: 50%;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -60%);
      z-index: 0;
      animation: blobPulse 4s ease-in-out infinite;
    }
    @keyframes blobPulse {
      0%, 100% { transform: translate(-50%, -60%) scale(1);   opacity: 1; }
      50%       { transform: translate(-50%, -60%) scale(1.15); opacity: 0.7; }
    }

    /* ── SCENE ── */
    .scene {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    /* ── BOUQUET ── */
    .stage {
      perspective: 700px;
      width: min(340px, 92vw);
      height: calc(min(340px, 92vw) * 0.94);
      position: relative;
      flex-shrink: 0;
    }

    .world {
      width: 100%;
      height: 100%;
      transform-style: preserve-3d;
      position: relative;
    }

    .rose {
      position: absolute;
      line-height: 1;
      user-select: none;
      animation: flyIn var(--dur) var(--delay) cubic-bezier(.34, 1.45, .64, 1) both;
    }

    @keyframes flyIn {
      from {
        transform: translate3d(var(--fx), var(--fy), var(--fz)) rotateZ(var(--fr)) scale(0.1);
        opacity: 0;
        filter: blur(12px) drop-shadow(0 0 0px rgba(220,40,40,0));
      }
      80% {
        filter: blur(0) drop-shadow(0 6px 18px rgba(220,40,40,0.6));
      }
      to {
        transform: translate3d(0px, 0px, var(--tz)) rotateZ(var(--rot)) scale(var(--sc));
        opacity: 1;
        filter: blur(0) drop-shadow(0 6px 18px rgba(220,40,40,0.4));
      }
    }

    /* spark flash when rose lands */
    .rose::after {
      content: '✨';
      position: absolute;
      top: -8px; left: 50%;
      transform: translateX(-50%);
      font-size: 0.8rem;
      opacity: 0;
      animation: spark var(--dur) calc(var(--delay) + var(--dur) - 0.15s) 1 ease-out;
    }
    @keyframes spark {
      0%   { opacity: 0; transform: translateX(-50%) scale(0.5) translateY(0); }
      30%  { opacity: 1; transform: translateX(-50%) scale(1.4) translateY(-8px); }
      100% { opacity: 0; transform: translateX(-50%) scale(0.8) translateY(-16px); }
    }

    /* Stems SVG */
    .stems {
      position: absolute;
      left: 50%;
      bottom: 6%;
      transform: translateX(-50%);
      opacity: 0;
      animation: fadeUp 0.9s 2.5s cubic-bezier(.34,1.4,.64,1) forwards;
    }
    /* Ribbon */
    .ribbon {
      position: absolute;
      bottom: -4px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 2.2rem;
      opacity: 0;
      animation: fadeUp 0.8s 2.8s cubic-bezier(.34,1.4,.64,1) forwards;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateX(-50%) translateY(12px); }
      to   { opacity: 1; transform: translateX(-50%) translateY(0); }
    }

    /* ── MESSAGE ── */
    .message {
      text-align: center;
      opacity: 0;
      animation: riseIn 1.4s 3.4s cubic-bezier(.34, 1.2, .64, 1) forwards;
      max-width: 400px;
      width: 100%;
      padding: 0 1.5rem;
      margin-top: 0;
    }

    @keyframes riseIn {
      from { opacity: 0; transform: translateY(40px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .message h1 {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-weight: 700;
      font-size: clamp(1.7rem, 7vw, 3.4rem);
      line-height: 1.2;
      background: linear-gradient(135deg, #f9a8d4 0%, #c084fc 45%, #818cf8 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 1.2rem;
    }

    .message p {
      color: rgba(255, 255, 255, 0.5);
      font-size: 1rem;
      line-height: 1.9;
      font-weight: 300;
    }

    .message .sig {
      margin-top: 1.8rem;
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 1.15rem;
      background: linear-gradient(135deg, #c084fc, #818cf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      opacity: 0;
      animation: riseIn 1s 4.6s forwards;
    }

    /* Divider line */
    .divider-line {
      width: 60px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(192,132,252,0.5), transparent);
      margin: 1.2rem auto;
      opacity: 0;
      animation: riseIn 1s 4.2s forwards;
    }

    /* Back link */
    .back-link {
      position: fixed;
      top: 1rem;
      left: 1rem;
      z-index: 10;
      color: rgba(255,255,255,0.2);
      text-decoration: none;
      font-size: 0.8rem;
      transition: color 0.3s;
      opacity: 0;
      animation: fadeIn 1s 5s forwards;
      padding: 0.5rem 0.75rem;
      border-radius: 8px;
    }
    .back-link:hover, .back-link:active { color: rgba(255,255,255,0.5); }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    /* Floating particles */
    .petal {
      position: fixed;
      font-size: var(--fs);
      animation: floatUp var(--pd) var(--pd2) linear infinite;
      opacity: 0;
      z-index: 0;
      pointer-events: none;
    }
    @keyframes floatUp {
      0%   { transform: translateY(110vh) translateX(0)         rotate(0deg)   scale(0.6); opacity: 0; }
      8%   { opacity: 0.55; }
      92%  { opacity: 0.3; }
      100% { transform: translateY(-10vh) translateX(var(--pdx)) rotate(360deg) scale(1);   opacity: 0; }
    }

    /* ── MOBILE ── */
    @media (max-width: 480px) {
      body { padding: 4rem 0 2.5rem; gap: 0; }

      .stage {
        width: 92vw;
        height: calc(92vw * 0.94);
      }

      .message { padding: 0 1.25rem; }

      .message h1 { font-size: clamp(1.5rem, 8vw, 2.2rem); margin-bottom: 0.85rem; }

      .message p { font-size: 0.9rem; line-height: 1.75; }

      .message .sig { font-size: 1rem; margin-top: 1.2rem; }

      .divider-line { margin: 0.85rem auto; }

      /* Fewer petals on mobile */
      .petal:nth-child(even) { display: none; }

      .glow-blob { width: 300px; height: 300px; }
    }
  </style>
</head>
<body>

  <canvas id="bg"></canvas>
  <div class="glow-blob"></div>

  <!-- Floating petals / hearts -->
  <div class="petal" style="left:5%;  --fs:1.1rem; --pd:9s;  --pd2:0s;   --pdx:25px">💜</div>
  <div class="petal" style="left:18%; --fs:0.9rem; --pd:12s; --pd2:1.2s; --pdx:-18px">🌸</div>
  <div class="petal" style="left:33%; --fs:0.75rem;--pd:8s;  --pd2:3s;   --pdx:12px">💜</div>
  <div class="petal" style="left:52%; --fs:1rem;   --pd:11s; --pd2:0.5s; --pdx:-30px">🌸</div>
  <div class="petal" style="left:68%; --fs:0.85rem;--pd:10s; --pd2:2s;   --pdx:20px">💜</div>
  <div class="petal" style="left:80%; --fs:1.1rem; --pd:7s;  --pd2:4s;   --pdx:-15px">🌸</div>
  <div class="petal" style="left:92%; --fs:0.8rem; --pd:13s; --pd2:1s;   --pdx:10px">💜</div>

  <a class="back-link" href="index.html">← volver</a>

  <div class="scene">

    <div class="stage">
      <div class="world" id="world">

        <!-- Stems -->
        <svg class="stems" width="47%" height="auto" viewBox="0 0 160 100">
          <line x1="80" y1="0" x2="20"  y2="100" stroke="#1f5c1f" stroke-width="3.5" stroke-linecap="round"/>
          <line x1="80" y1="0" x2="55"  y2="100" stroke="#256325" stroke-width="3"   stroke-linecap="round"/>
          <line x1="80" y1="0" x2="80"  y2="100" stroke="#1f5c1f" stroke-width="4"   stroke-linecap="round"/>
          <line x1="80" y1="0" x2="105" y2="100" stroke="#256325" stroke-width="3"   stroke-linecap="round"/>
          <line x1="80" y1="0" x2="140" y2="100" stroke="#1f5c1f" stroke-width="3.5" stroke-linecap="round"/>
          <!-- leaves -->
          <ellipse cx="38"  cy="55" rx="13" ry="6" fill="#1f5c1f" transform="rotate(-35,38,55)"  opacity="0.85"/>
          <ellipse cx="122" cy="60" rx="13" ry="6" fill="#1f5c1f" transform="rotate(30,122,60)"  opacity="0.85"/>
          <ellipse cx="68"  cy="75" rx="10" ry="5" fill="#256325" transform="rotate(-15,68,75)"  opacity="0.7"/>
        </svg>

        <!-- Ribbon bow -->
        <div class="ribbon">🎀</div>

      </div>
    </div>

    <div class="message">
      <h1>Para Mon,<br>mi peluchina hermosa</h1>
      <div class="divider-line"></div>
      <p>Te amo con toda mi alma.</p>
      <div class="sig">— De Osini 💜</div>
    </div>

  </div>

  <script>
    /* ── CANVAS STARFIELD ── */
    const canvas = document.getElementById('bg');
    const ctx = canvas.getContext('2d');

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    const stars = Array.from({ length: 140 }, () => ({
      x: Math.random(),
      y: Math.random(),
      r: Math.random() * 1.3 + 0.2,
      phase: Math.random() * Math.PI * 2,
      speed: Math.random() * 0.004 + 0.001,
    }));

    function drawBg(ts) {
      const w = canvas.width, h = canvas.height;
      ctx.clearRect(0, 0, w, h);

      // Background gradient
      const grad = ctx.createRadialGradient(w * 0.5, h * 0.4, 0, w * 0.5, h * 0.4, Math.max(w, h) * 0.75);
      grad.addColorStop(0, '#1a0030');
      grad.addColorStop(0.5, '#0d0018');
      grad.addColorStop(1, '#060008');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, w, h);

      // Stars
      stars.forEach(s => {
        const a = 0.25 + 0.75 * (0.5 + 0.5 * Math.sin(ts * 0.001 * s.speed * 400 + s.phase));
        ctx.beginPath();
        ctx.arc(s.x * w, s.y * h, s.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,255,255,${a.toFixed(3)})`;
        ctx.fill();
      });

      requestAnimationFrame(drawBg);
    }
    requestAnimationFrame(drawBg);

    /* ── BUILD 3D BOUQUET ── */
    // Each entry: [left_from_center, top_from_center, z, rotateZ_deg, scale, font_size_rem]
    const bouquetPoses = [
      // Back row  (z = -55)
      [-85, -25, -55, -20, 0.65, 1.8],
      [-45, -55, -55, -10, 0.67, 1.8],
      [  0, -68, -55,   0, 0.68, 1.9],
      [ 45, -55, -55,  10, 0.67, 1.8],
      [ 85, -25, -55,  20, 0.65, 1.8],
      // Mid row   (z =   0)
      [-62,  -5,   0, -14, 0.82, 2.3],
      [-22, -28,   0,  -5, 0.85, 2.3],
      [ 22, -28,   0,   5, 0.85, 2.3],
      [ 62,  -5,   0,  14, 0.82, 2.3],
      // Front row (z =  55)
      [-34,  22,  55, -10, 0.98, 2.9],
      [  0,  32,  55,   0, 1.00, 3.0],
      [ 34,  22,  55,  10, 0.98, 2.9],
    ];

    const world = document.getElementById('world');
    const stage = document.querySelector('.stage');

    // Scale all positions relative to the original 340px design
    const factor = stage.offsetWidth / 340;
    const cx = stage.offsetWidth / 2;
    const cy = stage.offsetHeight / 2 - 10 * factor;

    bouquetPoses.forEach(([tx, ty, tz, rot, sc, fs], i) => {
      const el = document.createElement('div');
      el.className = 'rose';
      el.textContent = '🌹';

      const stx  = tx  * factor;
      const sty  = ty  * factor;
      const stz  = tz  * factor;
      const sfs  = fs  * factor;
      const dist = (450 + Math.random() * 200) * factor;
      const angle = Math.random() * Math.PI * 2;
      const fx = (Math.cos(angle) * dist).toFixed(1);
      const fy = (Math.sin(angle) * dist).toFixed(1);
      const fz = ((Math.random() - 0.5) * 600 * factor).toFixed(1);
      const fr = ((Math.random() - 0.5) * 540).toFixed(1);
      const dur   = (0.85 + Math.random() * 0.35).toFixed(2);
      const delay = (0.15 + i * 0.13).toFixed(2);

      el.style.cssText = `
        left: ${cx + stx - sfs * 8}px;
        top:  ${cy + sty - sfs * 8}px;
        font-size: ${sfs}rem;
        z-index: ${50 + Math.round(stz)};
        --fx: ${fx}px;
        --fy: ${fy}px;
        --fz: ${fz}px;
        --fr: ${fr}deg;
        --tz: ${stz}px;
        --rot: ${rot}deg;
        --sc: ${sc};
        --dur: ${dur}s;
        --delay: ${delay}s;
      `;

      world.appendChild(el);
    });
  </script>

</body>
</html>
