<svg width="80" height="76" viewBox="0 0 80 76" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gA" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#7c3aed"/>
      <stop offset="50%"  stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="gB" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="gC" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>

  <!-- CONNECTOR LINES -->
  <line x1="40" y1="10" x2="26" y2="34" stroke="url(#gA)" stroke-width="2.2" stroke-linecap="round" opacity="0.8"/>
  <line x1="40" y1="10" x2="54" y2="34" stroke="url(#gB)" stroke-width="2.2" stroke-linecap="round" opacity="0.8"/>
  <line x1="26" y1="34" x2="16" y2="58" stroke="url(#gA)" stroke-width="2.2" stroke-linecap="round" opacity="0.8"/>
  <line x1="26" y1="34" x2="40" y2="58" stroke="url(#gA)" stroke-width="2.2" stroke-linecap="round" opacity="0.8"/>
  <line x1="54" y1="34" x2="40" y2="58" stroke="url(#gC)" stroke-width="2.2" stroke-linecap="round" opacity="0.8"/>
  <line x1="54" y1="34" x2="64" y2="58" stroke="url(#gC)" stroke-width="2.2" stroke-linecap="round" opacity="0.8"/>

  <!-- AMBIENT DOTS -->
  <circle cx="8"  cy="22" r="2.8" fill="#7c3aed" fill-opacity="0.42"/>
  <circle cx="74" cy="26" r="3.5" fill="#06b6d4" fill-opacity="0.38"/>
  <circle cx="5"  cy="48" r="2"   fill="#7c3aed" fill-opacity="0.28"/>
  <circle cx="76" cy="48" r="2.5" fill="#06b6d4" fill-opacity="0.32"/>
  <circle cx="20" cy="70" r="2"   fill="#2563eb" fill-opacity="0.28"/>
  <circle cx="62" cy="72" r="1.8" fill="#06b6d4" fill-opacity="0.24"/>

  <!-- NODES -->
  <!-- Apex -->
  <circle cx="40" cy="10" r="9.5" fill="#080810" stroke="url(#gA)" stroke-width="2"/>
  <circle cx="40" cy="10" r="3.4" fill="url(#gA)"/>
  <!-- Mid Left -->
  <circle cx="26" cy="34" r="8.5" fill="#080810" stroke="url(#gA)" stroke-width="1.8"/>
  <circle cx="26" cy="34" r="3"   fill="url(#gA)"/>
  <!-- Mid Right -->
  <circle cx="54" cy="34" r="8.5" fill="#080810" stroke="url(#gC)" stroke-width="1.8"/>
  <circle cx="54" cy="34" r="3"   fill="url(#gC)"/>
  <!-- Base Left -->
  <circle cx="16" cy="58" r="7.5" fill="#080810" stroke="url(#gA)" stroke-width="1.6"/>
  <circle cx="16" cy="58" r="2.6" fill="url(#gA)"/>
  <!-- Base Mid -->
  <circle cx="40" cy="58" r="7.5" fill="#080810" stroke="url(#gB)" stroke-width="1.6"/>
  <circle cx="40" cy="58" r="2.6" fill="url(#gB)"/>
  <!-- Base Right -->
  <circle cx="64" cy="58" r="7.5" fill="#080810" stroke="url(#gC)" stroke-width="1.6"/>
  <circle cx="64" cy="58" r="2.6" fill="url(#gC)"/>
</svg>
