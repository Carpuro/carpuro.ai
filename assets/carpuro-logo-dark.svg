<svg width="320" height="80" viewBox="0 0 320 80" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gA" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#7c3aed"/>
      <stop offset="50%"  stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="gB" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="gC" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="gT" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#7c3aed"/>
      <stop offset="50%"  stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>

  <!-- CONNECTOR LINES -->
  <line x1="36" y1="12" x2="24" y2="34" stroke="url(#gA)" stroke-width="1.6" stroke-linecap="round" opacity="0.75"/>
  <line x1="36" y1="12" x2="48" y2="34" stroke="url(#gB)" stroke-width="1.6" stroke-linecap="round" opacity="0.75"/>
  <line x1="24" y1="34" x2="16" y2="56" stroke="url(#gA)" stroke-width="1.6" stroke-linecap="round" opacity="0.75"/>
  <line x1="24" y1="34" x2="36" y2="56" stroke="url(#gA)" stroke-width="1.6" stroke-linecap="round" opacity="0.75"/>
  <line x1="48" y1="34" x2="36" y2="56" stroke="url(#gC)" stroke-width="1.6" stroke-linecap="round" opacity="0.75"/>
  <line x1="48" y1="34" x2="56" y2="56" stroke="url(#gC)" stroke-width="1.6" stroke-linecap="round" opacity="0.75"/>

  <!-- AMBIENT DOTS -->
  <circle cx="10" cy="22" r="2"   fill="#7c3aed" fill-opacity="0.4"/>
  <circle cx="63" cy="24" r="2.8" fill="#06b6d4" fill-opacity="0.38"/>
  <circle cx="6"  cy="46" r="1.6" fill="#7c3aed" fill-opacity="0.28"/>
  <circle cx="66" cy="46" r="2"   fill="#06b6d4" fill-opacity="0.32"/>
  <circle cx="18" cy="66" r="1.6" fill="#2563eb" fill-opacity="0.28"/>
  <circle cx="56" cy="68" r="1.4" fill="#06b6d4" fill-opacity="0.24"/>

  <!-- NODES -->
  <!-- Apex -->
  <circle cx="36" cy="12" r="8"   fill="#080810" stroke="url(#gA)" stroke-width="1.6"/>
  <circle cx="36" cy="12" r="2.8" fill="url(#gA)"/>
  <!-- Mid Left -->
  <circle cx="24" cy="34" r="7"   fill="#080810" stroke="url(#gA)" stroke-width="1.5"/>
  <circle cx="24" cy="34" r="2.5" fill="url(#gA)"/>
  <!-- Mid Right -->
  <circle cx="48" cy="34" r="7"   fill="#080810" stroke="url(#gC)" stroke-width="1.5"/>
  <circle cx="48" cy="34" r="2.5" fill="url(#gC)"/>
  <!-- Base Left -->
  <circle cx="16" cy="56" r="6.5" fill="#080810" stroke="url(#gA)" stroke-width="1.4"/>
  <circle cx="16" cy="56" r="2.2" fill="url(#gA)"/>
  <!-- Base Mid -->
  <circle cx="36" cy="56" r="6.5" fill="#080810" stroke="url(#gB)" stroke-width="1.4"/>
  <circle cx="36" cy="56" r="2.2" fill="url(#gB)"/>
  <!-- Base Right -->
  <circle cx="56" cy="56" r="6.5" fill="#080810" stroke="url(#gC)" stroke-width="1.4"/>
  <circle cx="56" cy="56" r="2.2" fill="url(#gC)"/>

  <!-- WORDMARK -->
  <text x="84" y="44"
    font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif"
    font-size="32" font-weight="300"
    fill="#e2e2f0" letter-spacing="-1.2"
    dominant-baseline="central">carpuro</text>

  <!-- .ai with gradient via rect+clip trick using a second text on top -->
  <text x="232" y="44"
    font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif"
    font-size="32" font-weight="700"
    fill="url(#gT)" letter-spacing="-1.2"
    dominant-baseline="central">.ai</text>

  <!-- Tagline -->
  <text x="84" y="62"
    font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif"
    font-size="8" font-weight="400"
    fill="#6b6b8a" letter-spacing="4"
    dominant-baseline="central">DATA INFRASTRUCTURE</text>
</svg>
